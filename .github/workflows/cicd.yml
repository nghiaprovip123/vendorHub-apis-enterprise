name: CI-CD VendorHub BackOffice APIs

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # Expose outputs để job deploy dùng lại
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Generate image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "📦 Image tag: ${SHORT_SHA}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}

  deploy:
    name: Deploy to K3s (SSH)
    runs-on: ubuntu-latest
    needs: build-and-push              # Đợi job 1 xong mới chạy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to K3s via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e    

            IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image_tag }}"

            echo "Deploying image: $IMAGE"

            kubectl set image deployment/vendorhub-backend \
              app=$IMAGE

            kubectl rollout status deployment/vendorhub-backend \
              --timeout=180s

            echo "Deploy thành công!"
            echo "Pods hiện tại:"
            kubectl get pods -l app=vendorhub-backend

      - name: Rollback nếu deploy thất bại
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: azureuser
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            echo "Deploy thất bại! Đang rollback..."
            kubectl rollout undo deployment/vendorhub-backend
            kubectl rollout status deployment/vendorhub-backend --timeout=120s
            echo "Rollback thành công!"