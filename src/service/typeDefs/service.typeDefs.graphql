scalar Upload
scalar DateTime

enum ServiceMediaType {
  IMAGE
  VIDEO
}

input CreateServiceMediaInput {
  file: Upload!
  type: ServiceMediaType!
  order: Int
}

input CreateServiceInput {
  categoryId: ID!
  name: String!
  description: String
  currency: String = "VND"
  displayPrice: Boolean = true
  duration: Int!
  price: Int!
  isVisible: Boolean = true
  medias: [CreateServiceMediaInput!]
}

type ServiceMedia {
  id: ID!
  url: String!
  type: ServiceMediaType
  order: Int
}

type Service {
  id: ID!
  categoryId: ID!
  name: String!
  description: String
  currency: String!
  displayPrice: Boolean!
  duration: Int!
  price: Int!
  isVisible: Boolean!
  medias: [ServiceMedia!]!
  createdAt: DateTime!
}

type ServiceResponse {
  service: Service!
}

extend type Mutation {
  createService(input: CreateServiceInput!): ServiceResponse!
}
