## ██████████████████████████████████████████████████████████████████████
## █                       SERVICE DOMAIN API CONTRACT                  █
## ██████████████████████████████████████████████████████████████████████
scalar Upload
scalar DateTime 
#######################################ENUMERATED###############################################
enum ServiceMediaType {
  IMAGE
  VIDEO
} 
#######################################CORE SERVICE ENTITIY#####################################
type Service {
  id: ID!
  categoryId: ID!
  name: String!
  description: String
  currency: String!
  displayPrice: Boolean!
  duration: Int!
  price: Int!
  isVisible: Boolean!
  medias: [ServiceMedia!]!
  createdAt: DateTime!
}

type ServiceMedia {
  id: ID!
  public_id: String!
  url: String!
  type: ServiceMediaType
  order: Int
} 
#######################################CREATE SERVICE INPUT SCHEMA##############################
input CreateServiceMediaInput {
  file: Upload!
  type: ServiceMediaType!
  order: Int
}

input CreateServiceInput {
  categoryId: ID!
  name: String!
  description: String
  currency: String = "VND"
  displayPrice: Boolean = true
  duration: Int!
  price: Int!
  isVisible: Boolean = true
  medias: [CreateServiceMediaInput!]
} 
##################################VIEW LIST OF SERVICE INPUT SCHEMA#############################
input ViewServiceListInput {
  page: Int!
}
#####################################UPDATE SERVICE INPUT SCHEMA################################
input UpdateServiceMediaInput {
  file: Upload
  type: ServiceMediaType
  order: Int
}

input UpdateServiceInput {
  id: ID!
  categoryId: ID
  name: String
  description: String
  currency: String = "VND"
  displayPrice: Boolean = true
  duration: Int
  price: Int
  isVisible: Boolean
  medias: [CreateServiceMediaInput]
}
###################################VIEW SERVICE DETAIL INPUT SCHEMA##############################
input ViewServiceDetailInput {
  id: ID!
}
###################################DELETE SERVICE INPUT SCHEMA##############################
input DeleteServiceInput {
  id: ID!
}
#######################################CREATE SERVICE RESPONSE##################################
type ServiceResponse {
  service: Service!
}
#####################################VIEW LIST OF SERVICE RESPONSE##############################
type ViewServiceListResponse {
  items: [Service]
  total: Int
}
#####################################DELETE SERVICE RESPONSE##############################
type ViewServiceListResponse {
  success: Boolean!
  message: String!
}

#######################################RESOLVER#################################################
extend type Mutation {
  createService(input: CreateServiceInput!): ServiceResponse!
  updateService(input: UpdateServiceInput!): ServiceResponse!
  deleteService(input: DeleteServiceInput!): ViewServiceListResponse!
}

extend type Query {
  viewServiceList(input: ViewServiceListInput!): ViewServiceListResponse!
  viewServiceDetail(input: ViewServiceDetailInput!): ServiceResponse!
}
