# id        String   @id @map("_id") @default(auto()) @db.ObjectId
# serviceId String   @db.ObjectId 
# service   Service  @relation("mediaService", fields: [serviceId], references: [id])
# url       String
# type      ServiceMediaType?
# order     Int?
scalar Upload

input CreateServiceInput {
  categoryId: ID!
  name: String!
  description: String
  currency: String = "VND"
  displayPrice: Boolean = true
  duration: Int!
  price: Int!
  isVisible: Boolean = true

  medias: [CreateServiceMediaInput!]
}

input CreateServiceMediaInput {
  file: Upload!
  type: ServiceMediaType!
  order: Int
}

type ServiceMedia {
  id: ID!
  url: String!
  type: ServiceMediaType
  order: Int
}

type Service {
  id: ID!
  categoryId: ID!
  name: String!
  description: String
  currency: String!
  displayPrice: Boolean!
  duration: Int!
  price: Int!
  isVisible: Boolean!
  medias: [ServiceMedia!]!
  createdAt: DateTime!
}

type ServiceResponse {
  service: Service!
}


extend type Mutation {
  createService(input: CreateServiceInput!): ServiceResponse!
}