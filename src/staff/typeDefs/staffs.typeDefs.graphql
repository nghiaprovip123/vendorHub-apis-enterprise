## ██████████████████████████████████████████████████████████████████████
## █                           STAFF DOMAIN API CONTRACT                █
## ██████████████████████████████████████████████████████████████████████
scalar Upload
################################################################################################ 
#######################################CORE STAFF ENTITIY & RESPONSE############################
################################################################################################
type WorkingHour {
  id: ID!
  day: Int!        
  startTime: String!  
  endTime: String!    
  createdAt: String!
  updatedAt: String!
}

type Staff {
  id: ID!
  fullName: String!
  avatar_url: String
  avatar_public_id: String
  timezone: String!
  isActive: Boolean!
  isDeleted: Boolean!
  workingHours: [WorkingHour!]!
  createdAt: String
  updatedAt: String
}

type GetStaffListResponse {
  items: [Staff]!
  total: Int!
}

type DeleteStaffResponse {
  success: Boolean!
  message: String!
}
################################################################################################ 
#######################################INPUT SCHEMA#############################################
################################################################################################
input WorkingHourInput {
  day: Int!
  startTime: String!
  endTime: String!
}

input CreateStaffInput {
  fullName: String!
  avatar: Upload
  timezone: String! 
  isActive: Boolean
  isDeleted: Boolean
  workingHours: [WorkingHourInput!]!
  services: [ID!]!
}

input UpdateStaffInput {
  id: String!
  fullName: String
  avatar: Upload
  timezone: String
  isActive: Boolean
  isDeleted: Boolean
  workingHours: [WorkingHourInput]
  services: [ID]

}

input DeleteStaffInput {
  id: String!
  public_id: String!
}

input GetStaffListInput {
  page: Int!
}

input GetAvailableStaffByBookingtimeInput {
  day: Int!
  startTime: String!
  endTime: String!
}
################################################################################################ 
#######################################RESOLVER#################################################
################################################################################################
extend type Mutation {
  createStaff(input: CreateStaffInput!): Staff!
  updateStaff(input: UpdateStaffInput!): Staff!
  deleteStaff(input: DeleteStaffInput!): DeleteStaffResponse!
}

type Query {
  getStaffList(input: GetStaffListInput!): GetStaffListResponse!
  getAvailableStaffByBookingTime(input: GetAvailableStaffByBookingtimeInput!): [Staff]!
}