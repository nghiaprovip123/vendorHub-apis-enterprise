input CreateBookingInput { 
  serviceId: String!
  staffId: String                       
  day: String!
  startTime: String!
  endTime: String!
  customerName: String!
  customerPhone: String!
  customerEmail: String!
  notes: String!
}

type CreateBookingResponse {
  id: ID!
  serviceId: String!
  staffId: String
  customerName: String
  customerPhone: String
  customerEmail: String
  notes: String
  status: String
  cancelledAt: String
  cancelReason: String
  createdAt: String
  updatedAt: String
  # Update để match đúng field từ slot (có thể trả nested)
  slot: Slot
}

type Slot {
  day: String
  startTime: String
  endTime: String
  durationInMinutes: Int
}


input AssignStaffForBookingRequestInput {
  staffId: String!
  bookingId: String!
}

type AssignStaffForBookingRequestResponse {
  success: Boolean
  message: String
  booking: CreateBookingResponse
}

input CancelBookingInput {
  bookingId: String!
  cancelReason: String!
} 

type CancelBookingResponse {
  success: Boolean
  message: String
  booking: CreateBookingResponse
}

input ViewBookingDetailInput {
  bookingId: String!
}

type getBookingListInBackOfficeResponse {
  bookingList: [CreateBookingResponse]
  total: Int
}

input getBookingWeekyListInBackOfficeInput {
  reference: String
}

input getBookingMonthlyListInBackOfficeInput {
  reference: String
}

type Mutation {
    createBookingByCustomer(input: CreateBookingInput): CreateBookingResponse
}

type Mutation {
    createBookingInBackOffice(input: CreateBookingInput): CreateBookingResponse
}

type Mutation {
  assignStaffByBookingRequest(input: AssignStaffForBookingRequestInput): AssignStaffForBookingRequestResponse
}

type Mutation {
  cancelBooking(input: CancelBookingInput): CancelBookingResponse
}

type Query {
  viewBookingDetailInBackOffice(input: ViewBookingDetailInput): CreateBookingResponse
}

type Query {
  getBookingListInBackOfficeByWeek(input: getBookingWeekyListInBackOfficeInput): getBookingListInBackOfficeResponse
}

type Query {
  getBookingListInBackOfficeByMonth(input: getBookingMonthlyListInBackOfficeInput): getBookingListInBackOfficeResponse
}