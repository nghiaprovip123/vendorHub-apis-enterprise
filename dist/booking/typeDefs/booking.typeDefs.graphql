scalar DateTime
type BookingService {
  id: ID!
  category: Category
  name: String!
  description: String
  currency: String!
  displayPrice: Boolean!
  duration: Int!
  price: Int!
  isVisible: Boolean!
  medias: [ServiceMedia!]!
  createdAt: DateTime!
}

type BookingStaff {
  id: ID!
  fullName: String!
  avatar_url: String
  avatar_public_id: String
  timezone: String!
  isActive: Boolean!
  isDeleted: Boolean!
  phoneNumber: String
  services: [StaffService]
  workingHours: [WorkingHour!]!
  createdAt: DateTime
  updatedAt: DateTime
}

input CreateBookingInput { 
  serviceId: String!
  staffId: String                       
  day: String!
  startTime: String!
  endTime: String!
  customerName: String!
  customerPhone: String!
  customerEmail: String!
  notes: String!
}

input UpdateBookingInput {
  id: ID!
  serviceId: String
  staffId: String                       
  day: String
  startTime: String
  endTime: String
  customerName: String
  customerPhone: String
  customerEmail: String
  notes: String
}

type CreateBookingResponse {
  id: ID!
  bookingService: BookingService
  bookingStaff: BookingStaff
  customerName: String
  customerPhone: String
  customerEmail: String
  notes: String
  status: String
  cancelledAt: String
  cancelReason: String
  createdAt: DateTime
  updatedAt: DateTime
  slot: Slot
}

type Slot {
  day: DateTime
  startTime: DateTime
  endTime: DateTime
  durationInMinutes: Int
}

input AssignStaffForBookingRequestInput {
  staffId: String!
  bookingId: String!
}

type AssignStaffForBookingRequestResponse {
  success: Boolean
  message: String
  booking: CreateBookingResponse
}

input CancelBookingInput {
  bookingId: String!
  cancelReason: String!
} 

type CancelBookingResponse {
  success: Boolean
  message: String
  booking: CreateBookingResponse
}

input ViewBookingDetailInput {
  bookingId: String!
}

type getBookingListResponse {
  bookingList: [CreateBookingResponse]
  total: Int
  totalPending: Int
  totalNoShow: Int
  totalCancelled: Int
}

input getBookingListInput {
  startDate: String
  endDate: String
}

input GetBookingByStaffInput {
  staffId: ID
  startDate: String
  endDate: String
}

type Mutation {
  createBookingByCustomer(input: CreateBookingInput): CreateBookingResponse
  createBookingInBackOffice(input: CreateBookingInput): CreateBookingResponse
  assignStaffByBookingRequest(input: AssignStaffForBookingRequestInput): AssignStaffForBookingRequestResponse
  cancelBooking(input: UpdateBookingInput): CreateBookingResponse
  confirmBooking(input: UpdateBookingInput): CreateBookingResponse
}

type Query {
  viewBookingDetail(input: ViewBookingDetailInput): CreateBookingResponse
  getBookingList(input: getBookingListInput): getBookingListResponse
  getBookingByStaff(input: GetBookingByStaffInput): getBookingListResponse
}

type Subscription {
  bookingStatusChanged: CreateBookingResponse!
}